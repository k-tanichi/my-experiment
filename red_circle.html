<!DOCTYPE html>
<html>
<head>
  <title>jsPsych Experiment</title>
  <!-- jsPsych v7.x core and CSS -->
  <script src="https://unpkg.com/jspsych@7.3.4"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
  <link rel="stylesheet" href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css">
  <style>
    /* 1. 背景色を灰色に設定 */
    body {
      background-color: #808080;
      color: white; /* 文字を読みやすくするために白に設定 */
    }

    /* 2. 直径100pxの赤い円のスタイル */
    .red-circle {
      width: 100px;
      height: 100px;
      background-color: #ff0000;
      border-radius: 50%;
      margin: 0 auto; /* 中央揃え用 */
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body></body>
<script>
  /**
   * jsPsych v7 仕様
   * 背景: #808080
   * 刺激: 直径100pxの赤い円 (CSS)
   * 反応: スペースキー
   */

  // jsPsychの初期化
  const jsPsych = initJsPsych({
    on_finish: function() {
      // 最後にデータを表示
      jsPsych.data.displayData();
    }
  });

  const timeline = [];

  // 円の提示トライアル
  const circle_trial = {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: `
      <div class="container">
        <div class="red-circle"></div>
      </div>
    `,
    choices: [' '], // 3. スペースキーが押されるまで表示
    data: {
      task: 'circle_presentation'
    }
  };
  timeline.push(circle_trial);

  // 4. 終了メッセージ
  const end_message = {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: `
      <div class="container">
        <p>終了しました。ご協力ありがとうございました。</p>
        <p>スペースキーを押すとデータが表示されます。</p>
      </div>
    `,
    choices: [' ']
  };
  timeline.push(end_message);

  // 実験開始
  jsPsych.run(timeline);
</script>
</html>
